name: Build NX Client

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build 2>&1 | tee build_output.txt; exit ${PIPESTATUS[0]}

      - name: Upload JAR on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nxclient-jar
          path: build/libs/nxclient-*.jar
          if-no-files-found: error

      - name: Extract errors and create error.txt
        if: failure()
        run: |
          python3 - << 'PYEOF'
          import re

          with open("build_output.txt", "r", encoding="utf-8", errors="replace") as f:
              raw = f.read()

          lines = raw.splitlines()
          seen = set()
          error_lines = []

          patterns = [
              r"error:",
              r"ERROR",
              r"FAILED",
              r"Exception",
              r"Could not",
              r"Caused by",
              r"Build FAILED",
              r"Execution failed",
          ]
          combined = re.compile("|".join(patterns))

          for i, line in enumerate(lines):
              if combined.search(line):
                  start = max(0, i - 2)
                  end = min(len(lines), i + 4)
                  block = "\n".join(lines[start:end])
                  if block not in seen:
                      seen.add(block)
                      error_lines.append(block)
                      error_lines.append("---")

          output = "\n".join(error_lines) if error_lines else "No specific errors captured.\n\nLast 3000 chars:\n" + raw[-3000:]

          with open("error.txt", "w", encoding="utf-8") as f:
              f.write("NX Client Build Error Report\n")
              f.write("=" * 40 + "\n\n")
              f.write(output)

          print("error.txt written.")
          PYEOF

      - name: Upload error.txt on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt
